name: docker-runtime-image

on:
  push:
    branches:
      - "**"
    paths:
      - Dockerfile
      - .dockerignore
      - default-danser.json
      - docker/entrypoint.sh
      - src/**
      - migrations/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/docker-runtime-image.yml
  workflow_dispatch:

concurrency:
  group: docker-runtime-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: mikumin27
  IMAGE_NAME: oscbot
  DANSER_REPO: https://github.com/Wieku/danser-go.git
  DANSER_COMMIT: 3eb75a34babb48590954deb836a585fe8174a1d5
  FFMPEG_TAG: latest
  FFMPEG_ASSET: ffmpeg-master-latest-linux64-gpl-shared.tar.xz
  GO_VERSION: "1.26"

jobs:
  build-binary:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev build-essential mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}

      - env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_STRIP: "symbols"
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
        run: cargo build --release --locked --bin oscbot

      - uses: actions/upload-artifact@v7
        with:
          name: oscbot-binary
          path: target/release/oscbot
          if-no-files-found: error
          retention-days: 1

  build-danser:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - id: cache
        uses: actions/cache@v5
        with:
          path: danser-out
          key: danser-${{ runner.os }}-${{ env.DANSER_COMMIT }}-${{ env.FFMPEG_TAG }}-${{ env.FFMPEG_ASSET }}

      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ca-certificates curl xz-utils \
            xorg-dev libgl1-mesa-dev libgtk-3-dev

      # Compiles danser from the pinned commit, then overlays BtbN's
      # GPL-shared ffmpeg (which has NVENC). The ffmpeg dir is flat —
      # binaries and shared libs all sit at danser-out/ffmpeg/.
      - if: steps.cache.outputs.cache-hit != 'true'
        env:
          DANSER_REPO: ${{ env.DANSER_REPO }}
          DANSER_COMMIT: ${{ env.DANSER_COMMIT }}
          FFMPEG_TAG: ${{ env.FFMPEG_TAG }}
          FFMPEG_ASSET: ${{ env.FFMPEG_ASSET }}
        run: |
          set -euxo pipefail
          mkdir -p src/danser
          git init src/danser
          git -C src/danser remote add origin "$DANSER_REPO"
          git -C src/danser fetch --depth 1 origin "$DANSER_COMMIT"
          git -C src/danser checkout -q FETCH_HEAD

          export GOOS=linux GOARCH=amd64 CGO_ENABLED=1 CC=gcc CXX=g++
          BUILD_DIR="$PWD/danser-out"
          mkdir -p "$BUILD_DIR"
          cd src/danser

          go run -buildvcs=false tools/assets/assets.go ./ "$BUILD_DIR/"
          go build -buildvcs=false -trimpath \
            -ldflags "-s -w -X 'github.com/wieku/danser-go/build.VERSION=dev-${DANSER_COMMIT}' -X 'github.com/wieku/danser-go/build.Stream=Release'" \
            -buildmode=c-shared -o "$BUILD_DIR/danser-core.so" \
            -tags "exclude_cimgui_glfw exclude_cimgui_sdli"
          mv "$BUILD_DIR/danser-core.so" "$BUILD_DIR/libdanser-core.so"
          cp libbass.so libbass_fx.so libbassmix.so libyuv.so libSDL3.so "$BUILD_DIR/"
          gcc -no-pie -O3 -o "$BUILD_DIR/danser-cli" -I. cmain/main_danser.c -I"$BUILD_DIR/" -Wl,-rpath,'$ORIGIN' -L"$BUILD_DIR/" -ldanser-core
          gcc -no-pie -O3 -D LAUNCHER -o "$BUILD_DIR/danser" -I. cmain/main_danser.c -I"$BUILD_DIR/" -Wl,-rpath,'$ORIGIN' -L"$BUILD_DIR/" -ldanser-core
          strip "$BUILD_DIR/danser" "$BUILD_DIR/danser-cli" 2>/dev/null || true
          rm -f "$BUILD_DIR/danser-core.h"
          cd "$GITHUB_WORKSPACE"

          mkdir -p danser-out/ffmpeg
          base="https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_TAG}"
          curl -fSL --retry 5 --retry-connrefused --retry-delay 3 "${base}/${FFMPEG_ASSET}" -o "/tmp/${FFMPEG_ASSET}"
          curl -fSL --retry 5 --retry-connrefused --retry-delay 3 "${base}/checksums.sha256" -o /tmp/checksums.sha256
          grep " ${FFMPEG_ASSET}\$" /tmp/checksums.sha256 | (cd /tmp && sha256sum -c -)
          tar -xJf "/tmp/${FFMPEG_ASSET}" -C danser-out/ffmpeg \
            --strip-components=2 --wildcards \
            '*/bin/ffmpeg' '*/bin/ffprobe' '*/lib/*'
          rm -f "/tmp/${FFMPEG_ASSET}" /tmp/checksums.sha256

          mkdir -p danser-out/{settings,Songs,Skins,Replays,videos}
          chmod 755 danser-out/danser danser-out/danser-cli danser-out/ffmpeg/ffmpeg danser-out/ffmpeg/ffprobe 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: danser-out
          path: danser-out
          if-no-files-found: error
          retention-days: 1

  docker:
    needs: [build-binary, build-danser]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            Dockerfile
            default-danser.json
            docker/entrypoint.sh
            src/generate/data
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          name: oscbot-binary
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: danser-out
          path: danser-out

      - run: chmod +x oscbot

      - id: buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: vars
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHA_SHORT="${REF_SHA::7}"
          IMAGE_OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="${REGISTRY}/${IMAGE_OWNER_LC}/${IMAGE_NAME_LC}"
          BRANCH_TAG="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          [ -z "$BRANCH_TAG" ] && BRANCH_TAG="branch"
          if [ "$REF_NAME" = "main" ]; then
            printf 'tags=%s:latest,%s:sha-%s\n' "$IMAGE_REPO" "$IMAGE_REPO" "$SHA_SHORT" >> "$GITHUB_OUTPUT"
          else
            printf 'tags=%s:%s,%s:%s-sha-%s\n' "$IMAGE_REPO" "$BRANCH_TAG" "$IMAGE_REPO" "$BRANCH_TAG" "$SHA_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
          sbom: true
          provenance: true
