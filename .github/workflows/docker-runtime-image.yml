name: docker-runtime-image

on:
  push:
    branches:
      - "**"
    paths:
      - Dockerfile
      - .dockerignore
      - default-danser.json
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/docker-runtime-image.yml
  workflow_dispatch:
  workflow_run:
    workflows:
      - docker-build-image
    types:
      - completed

concurrency:
  group: docker-runtime-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: mikumin27
  IMAGE_NAME: oscbot
  BUILD_IMAGE_NAME: oscbot-build

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags/args
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            REF_NAME="${{ github.event.workflow_run.head_branch }}"
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            REF_NAME="${GITHUB_REF_NAME}"
            FULL_SHA="${GITHUB_SHA}"
          fi

          SHA_SHORT="${FULL_SHA::7}"
          IMAGE_OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          BUILD_IMAGE_NAME_LC="$(echo "${BUILD_IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          IMAGE_REPO="${REGISTRY}/${IMAGE_OWNER_LC}/${IMAGE_NAME_LC}"
          BUILD_IMAGE_REPO="${REGISTRY}/${IMAGE_OWNER_LC}/${BUILD_IMAGE_NAME_LC}"

          BRANCH_TAG="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$BRANCH_TAG" ]; then BRANCH_TAG="branch"; fi

          if [ "$REF_NAME" = "main" ]; then
            echo "runtime_tags=${IMAGE_REPO}:latest,${IMAGE_REPO}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "build_image_ref=${BUILD_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
            echo "cache_ref_release=${IMAGE_REPO}:buildcache-rust-shared" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_tags=${IMAGE_REPO}:${BRANCH_TAG},${IMAGE_REPO}:${BRANCH_TAG}-sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "build_image_ref=${BUILD_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
            echo "cache_ref_release=${IMAGE_REPO}:buildcache-rust-shared" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute cache key prefix
        id: cachevars
        run: echo "prefix=cache-mounts-rust-v1-${{ runner.os }}-${{ hashFiles('Dockerfile','Cargo.lock','Cargo.toml','.github/workflows/docker-runtime-image.yml') }}" >> "$GITHUB_OUTPUT"

      - name: Ensure cache dir exists
        run: mkdir -p cache-mounts

      - name: Restore BuildKit cache mounts (cache-dance backing store)
        id: cache-mounts-restore
        uses: actions/cache/restore@v5
        with:
          path: cache-mounts
          key: ${{ steps.cachevars.outputs.prefix }}
          restore-keys: |
            ${{ steps.cachevars.outputs.prefix }}-
            cache-mounts-rust-v1-${{ runner.os }}-

      - name: Restore Rust cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: cache-mounts
          skip-extraction: true
          dockerfile: Dockerfile
          cache-map: |
            {
              "cache-mounts/apt-cache-rust": { "target": "/var/cache/apt", "id": "apt-cache-rust" },
              "cache-mounts/apt-lists-rust": { "target": "/var/lib/apt/lists", "id": "apt-lists-rust" },
              "cache-mounts/cargo-registry": { "target": "/usr/local/cargo/registry", "id": "cargo-registry" },
              "cache-mounts/cargo-git":      { "target": "/usr/local/cargo/git", "id": "cargo-git" },
              "cache-mounts/cargo-target-release": { "target": "/app/target-release", "id": "cargo-target-release" },
              "cache-mounts/cargo-target-debug":   { "target": "/app/target-debug",   "id": "cargo-target-debug" }
            }

      - name: Build & push runtime image (release)
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile
          build-args: |
            BUILD_IMAGE=${{ steps.vars.outputs.build_image_ref }}
            OSCBOT_PROFILE=release
            OSCBOT_LTO=thin
            OSCBOT_CODEGEN_UNITS=16
          push: true
          tags: ${{ steps.vars.outputs.runtime_tags }}
          cache-from: |
            type=gha,scope=release
            type=registry,ref=${{ steps.vars.outputs.cache_ref_release }}
          cache-to: |
            type=gha,mode=max,scope=release
            type=registry,ref=${{ steps.vars.outputs.cache_ref_release }},mode=max
          sbom: true
          provenance: true

      - name: Extract Rust cache mounts (cache-dance)
        if: always()
        uses: reproducible-containers/buildkit-cache-dance@v3
        env:
          STATE_POST: "true"
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: cache-mounts
          dockerfile: Dockerfile
          cache-map: |
            {
              "cache-mounts/apt-cache-rust": { "target": "/var/cache/apt", "id": "apt-cache-rust" },
              "cache-mounts/apt-lists-rust": { "target": "/var/lib/apt/lists", "id": "apt-lists-rust" },
              "cache-mounts/cargo-registry": { "target": "/usr/local/cargo/registry", "id": "cargo-registry" },
              "cache-mounts/cargo-git":      { "target": "/usr/local/cargo/git", "id": "cargo-git" },
              "cache-mounts/cargo-target-release": { "target": "/app/target-release", "id": "cargo-target-release" },
              "cache-mounts/cargo-target-debug":   { "target": "/app/target-debug",   "id": "cargo-target-debug" }
            }

      - name: Save BuildKit cache mounts
        if: always()
        uses: actions/cache/save@v5
        with:
          path: cache-mounts
          key: ${{ steps.cachevars.outputs.prefix }}-${{ github.run_id }}
