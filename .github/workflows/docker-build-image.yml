name: docker-build-image

on:
  push:
    branches:
      - "main"
    paths:
      - Dockerfile.build
      - .github/workflows/docker-build-image.yml
  workflow_dispatch:

concurrency:
  group: docker-build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: mikumin27
  BUILD_IMAGE_NAME: oscbot-build

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME}"
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BUILD_IMAGE_NAME_LC="$(echo "${BUILD_IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          BUILD_IMAGE_REPO="${REGISTRY}/${IMAGE_OWNER_LC}/${BUILD_IMAGE_NAME_LC}"

          BRANCH_TAG="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$BRANCH_TAG" ]; then BRANCH_TAG="branch"; fi

          if [ "$REF_NAME" = "main" ]; then
            echo "build_tags=${BUILD_IMAGE_REPO}:latest,${BUILD_IMAGE_REPO}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          else
            echo "build_tags=${BUILD_IMAGE_REPO}:${BRANCH_TAG},${BUILD_IMAGE_REPO}:${BRANCH_TAG}-sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push build artifacts image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile.build
          target: build-artifacts
          push: true
          tags: ${{ steps.vars.outputs.build_tags }}
          cache-from: type=gha,scope=build-artifacts
          cache-to: type=gha,mode=max,scope=build-artifacts
          sbom: true
          provenance: true
